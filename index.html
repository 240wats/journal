<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>240 - Journal</title>
    <style>
        body {
            margin: 0;
            padding: 6vw; 
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }

        header {
            margin-bottom: 10vw;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #888;
        }

        .journal-grid {
            display: flex;
            flex-direction: column;
            gap: 2vw; 
            max-width: 850px; /* Ancho controlado para que no sean gigantes */
            margin: 0 auto;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 2vw; 
            align-items: start;
        }

        .single-block {
            display: block;
            width: 45%; 
            margin: 0 auto;
        }

        img {
            display: block;
            width: 100%;
            height: auto;
            filter: grayscale(5%) contrast(1.05); 
        }

        .caption {
            margin-top: 12px;
            font-family: "SF Mono", "Monaco", "Inconsolata", monospace;
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <header>
        Journal / 240
    </header>

    <main class="journal-grid">
        
        <div class="row">
            <div class="item">
                <img src="imagen1.jpg" alt="Imagen 1">
                <div class="caption">Ref. 001</div>
            </div>
            <div class="item">
                <img src="imagen10.jpg" alt="Imagen 10">
                <div class="caption">Ref. 010</div>
            </div>
        </div>

        <div class="single-block">
            <img src="piedras.jpg" alt="Piedras">
            </div>

        <div class="row">
            <div class="item">
                <img src="imagen5.jpg" alt="Imagen 5">
                <div class="caption">Ref. 005</div>
            </div>
            <div class="item">
                <img src="imagen9.jpg" alt="Imagen 9">
                <div class="caption">Ref. 009</div>
    


            </div>
    
</div>
            </div>
        </div>

    </main>
