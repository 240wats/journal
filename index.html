<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>240</title>

  <style>
    body {
      margin: 0;
      padding: 0.5vw; /* Margen general mínimo */
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1.6fr 1fr; /* Columna central un poco más contenida */
      gap: 0.5vw; /* Separación mínima entre columnas */
      align-items: start; /* Las columnas tendrán su altura natural para un scroll fluido */
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 0.5vw; /* Separación mínima vertical entre imágenes */
    }

    img {
      display: block;
      width: 100%; /* Obligamos a TODAS las imágenes a ocupar el ancho total de su columna. ¡Adiós al aire blanco! */
      height: auto;
      object-fit: cover;
    }

    .texto {
      font-size: 1.1rem;
      line-height: 1.4;
      font-family: 'Times New Roman', Times, serif;
      color: #222;
      padding: 1vw 0; /* Solo un ínfimo respiro vertical para que el texto no esté literalmente pegado a la foto */
    }

    .texto p {
      margin: 3px 0;
    }
  </style>
</head>
<body>

  <div class="grid-container">
    
    <!-- COLUMNA IZQUIERDA -->
    <div class="col">
      <img src="imagen1.jpg" alt="Imagen 1" loading="lazy">
      <img src="piedras.jpg" alt="Imagen 1" loading="lazy">
      
      <div class="texto">
      
      </div>
    </div>

    <!-- COLUMNA CENTRAL -->
    <div class="col">
      <!-- La imagen central ahora ocupa absolutamente todo el ancho de su columna -->
      <img src="imagen5.jpg" alt="Imagen 5" loading="lazy">
    </div>

    <!-- COLUMNA DERECHA -->
    <div class="col">
      <img src="imagen4.jpg" alt="Imagen 4" loading="lazy">
      <img src="imagen6.jpg" alt="Imagen 6" loading="lazy">
      <img src="imagen10.jpg" alt="Imagen 6" loading="lazy">
    </div>

  </div>

</body>
</html>
