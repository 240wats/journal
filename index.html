<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>240 - Journal</title>
   <style>
    body {
        margin: 0;
        padding: 6vw; /* Más margen lateral */
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #000000;
        -webkit-font-smoothing: antialiased;
    }

    header {
        margin-bottom: 10vw;
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #888;
    }

    .journal-grid {
        display: flex;
        flex-direction: column;
        gap: 12vw; /* Más espacio entre filas */
        max-width: 900px; /* Estrechamos el contenedor principal */
        margin: 0 auto;
    }

    .row {
        display: grid;
        grid-template-columns: 1fr 1fr; 
        gap: 8vw; /* Más espacio entre las dos fotos */
        align-items: start;
    }

    .single-block {
        display: block;
        width: 45%; /* Imagen suelta mucho más chica */
        margin: 0 auto;
    }

    img {
        display: block;
        width: 100%;
        height: auto;
        /* Un toque más de contraste para ese look de impresión */
        filter: grayscale(5%) contrast(1.1); 
    }

    .caption {
        margin-top: 12px;
        font-family: "SF Mono", "Monaco", "Inconsolata", monospace;
        font-size: 10px; /* Texto más pequeño */
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
</style>
